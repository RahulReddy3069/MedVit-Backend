# Server Port Configuration
server.port=${PORT:8080}

# Spring DataSource (MySQL 8.0+)
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/hospital_consultation_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:root123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA and Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Upload Size Limits for Consultation Symptom Attachments
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# WebSocket Configuration Messaging prefix
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# JWT Secret
jwt.secret=${JWT_SECRET:medvitals-secret-key-change-in-production}

# Frontend URL for CORS
frontend.url=${FRONTEND_URL:https://med-vit.vercel.app}
