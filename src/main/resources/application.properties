# Server Port
server.port=${PORT:8080}

# PostgreSQL DataSource (Render injects DATABASE_URL automatically)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/hospital_db}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA and Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Disable schema.sql auto-run (JPA handles schema via ddl-auto=update)
spring.sql.init.mode=never

# Upload Size Limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# WebSocket
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# JWT Secret
jwt.secret=${JWT_SECRET:medvitals-secret-key-change-in-production}

# Frontend URL for CORS
frontend.url=${FRONTEND_URL:https://med-vit.vercel.app}
